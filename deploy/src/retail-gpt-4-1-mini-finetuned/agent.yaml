# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: retail-gpt-4-1-mini-finetuned
description: |
    Retail agent (gpt-4-1-mini-finetuned) with 6 tools for post-purchase resolution. Uses external tool server for policy lookup, inventory, and resolution processing.
metadata:
    tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Multi-Tool
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1-mini-2025-04-14.ft-2eb6d31ecccd4796bce8fd9ccdc1529d
    - name: TOOL_URL
      value: https://retail-tools-omkarm.azurewebsites.net
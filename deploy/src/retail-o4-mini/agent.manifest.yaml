name: retail-o4-mini
description: >
  Retail agent (o4-mini) with 6 tools for post-purchase resolution.
  Uses external tool server for policy lookup, inventory, and resolution processing.
metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Multi-Tool
template:
  name: retail-o4-mini
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{chat}}"
    - name: TOOL_URL
      value: "https://retail-tools-omkarm.azurewebsites.net"
resources:
  - kind: model
    id: o4-mini
    name: chat

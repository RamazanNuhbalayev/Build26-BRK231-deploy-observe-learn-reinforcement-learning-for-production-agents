name: retail-qwen3-32b-base
description: >
  Retail agent (qwen3-32b-base-finetuned) with 6 tools for post-purchase resolution.
  Uses external tool server for policy lookup, inventory, and resolution processing.
metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Multi-Tool
template:
  name: retail-qwen3-32b-base
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{chat}}"
    - name: TOOL_URL
      value: "https://retail-tools-omkarm.azurewebsites.net"
resources:
  - kind: model
    id: qwen3-32b-base-finetuned
    name: chat
